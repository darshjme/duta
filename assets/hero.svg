<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="accent_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#1f6feb;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="56" x2="800" y2="56"/>
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="168" x2="800" y2="168"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
  </g>

  <!-- Accent glow bar -->
  <rect x="0" y="270" width="800" height="3" fill="url(#accent_grad)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent_grad)"/>

  <!-- Animation area (right side) -->
  
  <g transform="translate(650,140)">
    <circle cx="0" cy="0" r="15" fill="#1f6feb" fill-opacity="0.8"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#1f6feb" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="15;50" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#1f6feb" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="15;50" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#1f6feb" stroke-width="2" opacity="0.8">
      <animate attributeName="r" values="15;50" dur="1.5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Left: text content -->
  <!-- Package badge -->
  <rect x="40" y="38" width="110" height="22" rx="11" fill="#1f6feb" fill-opacity="0.12" stroke="#1f6feb" stroke-width="1" stroke-opacity="0.5"/>
  <text x="95" y="53" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle" font-weight="600">darshjme</text>

  <!-- Title -->
  <text x="40" y="110" fill="#f0f6fc" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="38" font-weight="700" letter-spacing="-1">agent-dispatcher</text>

  <!-- Tagline -->
  <text x="40" y="148" fill="#8b949e" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15">Concurrent task dispatcher for parallel agent execution</text>

  <!-- Divider -->
  <line x1="40" y1="170" x2="460" y2="170" stroke="#1f6feb" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Pills -->
  
    <rect x="98" y="220" width="128" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="162" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Event Routing</text>
    <rect x="238" y="220" width="152" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="314" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Handler Registry</text>
    <rect x="402" y="220" width="136" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="470" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Async Dispatch</text>
    <rect x="550" y="220" width="152" height="26" rx="13" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="1"/>
    <text x="626" y="237" fill="#1f6feb" font-family="monospace" font-size="11" text-anchor="middle">Middleware Chain</text>
</svg>